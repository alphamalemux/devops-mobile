name: Build and Deploy PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @babel/core @babel/cli @babel/preset-react react react-dom

      - name: Create Babel Config
        run: echo '{"presets": ["@babel/preset-react"]}' > .babelrc

      - name: Transpile JSX to JS
        run: npx babel devops-platform.jsx --out-file devops-platform.js

      - name: Commit and push transpiled file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add devops-platform.js
          git commit -m "Auto-transpile JSX to JS [skip ci]" || echo "No changes to commit"
          git push origin main
