<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevOps Mobile AI Platform</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0f172a; z-index: 50; flex-direction: column; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p class="text-blue-400 font-medium animate-pulse text-sm">Loading Platform Assets...</p>
    </div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Load the pre-compiled JS file (built by GitHub Actions) -->
    <script src="devops-platform.js"></script>

    <script>
        const { createRoot } = ReactDOM;
        let retryCount = 0;
        
        function RenderLoop() {
            if (typeof App !== 'undefined') {
                createRoot(document.getElementById('root')).render(React.createElement(App));
                document.getElementById('loading').style.display = 'none';
                console.log("App Rendered!");
            } else if (retryCount < 10) {
                retryCount++;
                setTimeout(RenderLoop, 500);
            } else {
                document.getElementById('loading').innerHTML = '<div class="p-10 text-red-500 text-center">Failed to load system components.<br><span class="text-xs text-gray-500">Wait 1-2 mins for the first build to complete and reload.</span></div>';
            }
        }
        RenderLoop();
    </script>
</body>
</html>
