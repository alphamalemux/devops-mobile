<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevOps Mobile AI Platform</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0f172a; z-index: 50; flex-direction: column; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p class="text-blue-400 font-medium animate-pulse">Initializing Platform...</p>
    </div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- This script is where the main app logic lives -->
    <script type="text/babel" src="devops-platform.jsx" data-presets="react"></script>

    <!-- This script starts the app -->
    <script type="text/babel" data-presets="react">
        const { createRoot } = ReactDOM;
        
        function InitializeApp() {
            try {
                const container = document.getElementById('root');
                const root = createRoot(container);
                
                // Check if 'App' exists in the scope (defined in devops-platform.jsx)
                if (typeof App !== 'undefined') {
                    root.render(<App />);
                    document.getElementById('loading').style.display = 'none';
                    console.log("DevOps Platform Loaded Successfully");
                } else {
                    console.log("App not ready, retrying in 1s...");
                    setTimeout(InitializeApp, 1000);
                }
            } catch (err) {
                console.error("Initialization Error:", err);
                // Don't show error immediately, as 'App' might just be compiling
                setTimeout(InitializeApp, 2000);
            }
        }

        // Start the initialization loop
        InitializeApp();
    </script>
</body>
</html>
