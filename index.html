<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevOps Mobile AI Platform</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fallback to inline Babel processing for now -->
    <script type="text/babel" src="devops-platform.jsx" data-presets="react" data-type="module"></script>

    <script type="text/babel">
        const { createRoot } = ReactDOM;
        let retryCount = 0;
        
        function RenderLoop() {
            if (typeof App !== 'undefined') {
                createRoot(document.getElementById('root')).render(<App />);
                console.log("App Rendered!");
            } else if (retryCount < 30) {
                retryCount++;
                setTimeout(RenderLoop, 1000);
            } else {
                document.body.innerHTML = '<div class="p-10 text-red-500">Failed to load App component. Check console.</div>';
            }
        }
        RenderLoop();
    </script>
</body>
</html>
